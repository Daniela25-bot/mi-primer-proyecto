<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="container">
    <section class="text-section">
      <img src="./images/logo.svg" alt="un logo que dice base apparel">

     <div class="text-presentation">
       <h1>
        <span class="title-one">W e ' r e</span>
        <span class="title-two">
          <span style="display: block;">
            c o m i n g
          </span>
          <span>
            s o o n
          </span>
        </span>
      </h1>
    
      <p>
        Hello fellow shoppers! We're currently building our new fashion store. 
        Add your email below to stay up-to-date with announcements and our launch deals.
      </p>
    
      <div class="email-input">
        <input type="email" name="" id="" placeholder="Email Address">
        <button>
          <img src="./images/icon-arrow.svg" alt="">
        </button>
      </div>
     </div>
    </section>
    <section class="img-section">
      <img src="./images/hero-desktop.jpg" alt="una modelo posando con un vestido de moda">
    </section>
  </main>
  
    <!-- <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->
</body>
</html>
